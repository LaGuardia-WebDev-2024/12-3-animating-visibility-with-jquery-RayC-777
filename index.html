<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="button1">Hide</button>
    <button id="button2">Slide</button>
    <button id="button3">Fade In</button>
    <button id="button4">Surprise</button>

    <h1 id="snake-h1">Snake</h1>
    <img
      id="snake-pic"
      src="https://sites.nd.edu/biomechanics-in-the-wild/files/2023/10/snake-7325757_640.jpg"
      width="400" />

      <h1 id="snake2-h1">Look how Dapper he is!!!</h1>
      <img
      id="snake-pic2"
      src="https://i.redd.it/5fb7d6r51yh61.jpg"
      width="400" />
   
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      var $pic = $("#snake-pic");
      var $h1 = $("#snake-h1");
      var $pic2 = $("snake-pic2");
      var $h1 = $("snake2-h1");

      // ======================== Button #1
      $("#button1").click(function () {
        $pic.hide();
        $h1.hide();
      });

      // ======================== Button #2
      $("#button2").click(function () {
       
if ($("#snake-pic").is(":visible")) {
    $("#snake-pic").slideUp(2500);
        } 
        else {
    $("#snake-pic").slideDown(2500);
        }
        if ($("#snake-h1").is(":visible")) {
    $("#snake-h1").slideUp(2500);
        } 
  
        else {
    $("#snake-h1").slideDown(2500);
        }       

      });

      // ======================== Button #3
      
      $("#button3").click(function () {

        if ($("#snake-pic").is(":visible")) {
    $("#snake-pic").fadeOut(2500);
        } 
  
        else {
    $("#snake-pic").fadeIn(2500);
        }
        if ($("#snake-h1").is(":visible")) {
    $("#snake-h1").fadeOut(2500);
        } 
  
        else {
    $("#snake-h1").fadeIn(2500);
        }       

      });


       // ======================== Button #3
      $("#button4").click(function () {
    
        $("#snake-pic2").fadeIn(2000); 
        $("#snake2-h1").fadeIn(2000);
      });


    </script>
  </body>
</html>
